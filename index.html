<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico">
  <title>Alex Approves</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f4f4f4;
      text-align: center;
    }

    h1 { margin-bottom: 10px; }

    .toggle-group {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    .toggle-btn {
      padding: 10px 20px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      color: black;
      font-weight: bold;
      transition: 0.2s;
    }

    .toggle-btn.active {
      background: #222;
      color: white;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      flex-wrap: wrap;
    }

    .pagination button {
      padding: 8px 16px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 6px;
      font-size: 14px;
      transition: 0.2s;
    }

    .pagination button:hover:not(:disabled) {
      background: #eee;
      border-color: #888;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination .page-info {
      font-size: 14px;
      color: #555;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 6px #ccc;
      width: 180px;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }

    .card:hover {
      box-shadow: 0 4px 14px #bbb;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
      pointer-events: none;
    }

    .card-title {
      margin-top: 6px;
      pointer-events: none;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      justify-content: flex-start;
    }

    .info-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-style: italic;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      line-height: 1;
      box-sizing: border-box;
    }

    .info-btn:hover {
      background: #333;
    }

    .torrent-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1b5e20;
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .torrent-btn:hover {
      background: #2e7d32;
    }

    .torrent-btn svg {
      display: block;
    }

    .rating {
      font-size: 18px;
      font-weight: bold;
      flex: 1;
      text-align: center;
      pointer-events: none;
    }

    .player-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.55);
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
    }

    .player-modal.is-open {
      display: flex;
    }

    .player-modal-dialog {
      background: #fff;
      border-radius: 12px;
      max-width: 960px;
      width: 100%;
      max-height: 92vh;
      overflow: auto;
      position: relative;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      padding: 16px 16px 24px;
      text-align: center;
    }

    .player-modal-close {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 36px;
      height: 36px;
      border: none;
      background: #eee;
      border-radius: 8px;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .player-modal-close:hover {
      background: #ddd;
    }

    .player-modal-title {
      margin: 0 40px 12px 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: #222;
    }

    #kinobdMount {
      min-height: 120px;
    }

    .lang-select {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
    }

    .lang-select select {
        padding: 6px 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: white;
        font-size: 14px;
        cursor: pointer;
        outline: none;
        transition: border 0.2s;
    }

    .lang-select select:hover {
        border-color: #888;
    }

    .lang-select label[for="lang"] {
      cursor: default;
      user-select: none;
    }

    .easter-egg-panel {
      display: none;
      max-width: 960px;
      margin: 2rem auto 2rem;
      padding: 1.25rem;
      border: 1px dashed #aaa;
      border-radius: 12px;
      background: #fafafa;
      text-align: left;
    }

    .easter-egg-panel.is-visible {
      display: block;
    }

    .easter-egg-hint {
      margin: 0 0 0.75rem;
      font-size: 0.85rem;
      color: #666;
    }

    .easter-egg-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .easter-egg-row label {
      font-size: 14px;
      font-weight: 600;
    }

    #easterKpInput {
      min-width: 160px;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    #easterKpCheck {
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 6px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
      font-size: 14px;
    }

    #easterKpCheck:hover {
      background: #444;
    }

    #easterKinobdMount {
      min-height: 80px;
    }

    .easter-error {
      margin: 0;
      padding: 0.75rem;
      color: #b00020;
      font-size: 14px;
    }

  </style>
</head>
<body>
  <h1>For anyone looking for something to watch... I hope you find it as interesting as I do.</h1>

  <div class="toggle-group">
    <div class="toggle-btn active" id="tvBtn">TV-SHOWS</div>
    <div class="toggle-btn" id="movieBtn">MOVIES</div>
  </div>

  <div class="pagination" id="pagination" style="display: none;">
    <button type="button" id="prevBtn">← Prev</button>
    <span class="page-info" id="pageInfo">Page 1 of 1</span>
    <button type="button" id="nextBtn">Next →</button>
  </div>

  <div class="grid" id="list"></div>

  <div class="player-modal" id="playerModal" role="dialog" aria-modal="true" aria-labelledby="playerModalTitle">
    <div class="player-modal-dialog">
      <button type="button" class="player-modal-close" id="playerModalClose" aria-label="Close">×</button>
      <h2 class="player-modal-title" id="playerModalTitle">Player</h2>
      <div id="kinobdMount"></div>
    </div>
  </div>

  <div class="lang-select">
    <label for="lang" id="langGlobeLabel">🌐</label>
    <select id="lang">
      <option value="en-US">English</option>
      <option value="ru-RU">Русский</option>
      <option value="pt-PT">Português</option>
      <option value="uk-UA">Українська</option>
    </select>
  </div>

  <section id="easterEggPanel" class="easter-egg-panel" aria-hidden="true">
    <p class="easter-egg-hint">Manual KinoBD player (Kinopoisk ID)</p>
    <div class="easter-egg-row">
      <label for="easterKpInput">Kinopoisk ID</label>
      <input type="text" id="easterKpInput" inputmode="numeric" autocomplete="off" placeholder="e.g. 104122" />
      <button type="button" id="easterKpCheck">Check</button>
    </div>
    <div id="easterKinobdMount"></div>
  </section>

  <script>
    const savedLanguage = localStorage.getItem('selectedLanguage');
    let currentLanguage = savedLanguage || 'ru-RU';
    const API_KEY = '6f9e225e6b29d098b4a4fa7826fdba57';
    let currentType = 'tv';
    const PAGE_SIZE = 24;
    let currentPage = 1;
    let fullList = [];

    document.getElementById('tvBtn').addEventListener('click', () => {
      currentType = 'tv';
      currentPage = 1;
      toggleActive('tvBtn');
      loadRatings();
    });

    document.getElementById('movieBtn').addEventListener('click', () => {
      currentType = 'movie';
      currentPage = 1;
      toggleActive('movieBtn');
      loadRatings();
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderPage();
      }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      const totalPages = Math.ceil(fullList.length / PAGE_SIZE);
      if (currentPage < totalPages) {
        currentPage++;
        renderPage();
      }
    });

    function toggleActive(activeId) {
      document.getElementById('tvBtn').classList.remove('active');
      document.getElementById('movieBtn').classList.remove('active');
      document.getElementById(activeId).classList.add('active');
    }

    function getJsonPath() {
      return currentType === 'tv' ? 'tv.json' : 'movies.json';
    }

    async function fetchOneItem(item) {
      const tmdbId = Number(item.tmdb_id);
      if (Number.isInteger(tmdbId) && tmdbId > 0) {
        const cacheKey = `${currentType}_id_${tmdbId}_${currentLanguage}`;
        const cached = localStorage.getItem(cacheKey);
        if (cached) return JSON.parse(cached);

        const detailURL = `https://api.themoviedb.org/3/${currentType}/${tmdbId}?api_key=${API_KEY}&language=${currentLanguage}`;
        const res = await fetch(detailURL);
        if (res.ok) {
          const data = await res.json();
          if (data && data.id) {
            localStorage.setItem(cacheKey, JSON.stringify(data));
            return data;
          }
        }
      }

      const cacheKey = `${currentType}_${item.title}`;
      const cached = localStorage.getItem(cacheKey);
      if (cached) return JSON.parse(cached);

      let queryURL = `https://api.themoviedb.org/3/search/${currentType}?api_key=${API_KEY}&query=${encodeURIComponent(item.title)}&language=${currentLanguage}`;
      if (item.year) {
        if (currentType === 'tv') queryURL += `&first_air_date_year=${item.year}`;
        else if (currentType === 'movie') queryURL += `&primary_release_year=${item.year}`;
      }
      const res = await fetch(queryURL);
      const data = await res.json();
      const first = data.results?.[0];
      if (first) localStorage.setItem(cacheKey, JSON.stringify(first));
      return first || null;
    }

    async function loadRatings() {
      const res = await fetch(getJsonPath());
      fullList = await res.json();
      fullList.sort((a, b) => {
        const ra = typeof a.rating === 'number' ? a.rating : 0;
        const rb = typeof b.rating === 'number' ? b.rating : 0;
        return rb - ra;
      });

      const totalPages = Math.ceil(fullList.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

      const paginationEl = document.getElementById('pagination');
      paginationEl.style.display = totalPages > 1 ? 'flex' : 'none';
      await renderPage();
    }

    const playerModal = document.getElementById('playerModal');
    const kinobdMount = document.getElementById('kinobdMount');
    const playerModalTitle = document.getElementById('playerModalTitle');
    let kinobdScriptPromise = null;

    function ensureKinobdScript() {
      if (typeof window.kbp === 'function') return Promise.resolve();
      if (kinobdScriptPromise) return kinobdScriptPromise;
      kinobdScriptPromise = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://kinobd.net/js/player_.js';
        s.async = true;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('KinoBD script failed to load'));
        document.head.appendChild(s);
      });
      return kinobdScriptPromise;
    }

    function clearKinobdDom() {
      document.getElementById('kinobd-wrapper')?.remove();
      document.getElementById('kinobd-buttons')?.remove();
      document.getElementById('kinobd')?.remove();
    }

    async function initKinobdWidget(errorContainer) {
      const hadKbp = typeof window.kbp === 'function';
      try {
        await ensureKinobdScript();
        if (hadKbp && typeof window.kbp === 'function') {
          window.kbp();
        }
      } catch (e) {
        errorContainer.innerHTML = '<p style="padding:1rem;color:#c00;">Failed to load KinoBD widget.</p>';
      }
    }

    async function finalizeKinobdMount() {
      await initKinobdWidget(kinobdMount);
      playerModal.classList.add('is-open');
    }

    /**
     * Online player: Kinopoisk ID only (data-kinopoisk), not TMDb.
     */
    async function openPlayerModal(title, kinopoiskId) {
      playerModalTitle.textContent = title || 'Player';
      clearKinobdDom();
      kinobdMount.replaceChildren();
      easterKinobdMount.replaceChildren();

      const kp = Number(kinopoiskId);
      if (!Number.isInteger(kp) || kp <= 0) {
        kinobdMount.innerHTML = '<p style="padding:1rem;color:#555;">No Kinopoisk ID for this title.</p>';
        playerModal.classList.add('is-open');
        return;
      }

      const div = document.createElement('div');
      div.id = 'kinobd';
      div.setAttribute('data-kinopoisk', String(kp));
      kinobdMount.appendChild(div);
      await finalizeKinobdMount();
    }

    /**
     * KinoBD torrent block: data-player="torrent" + data-title (per KinoBD docs).
     */
    async function openTorrentModal(displayTitle, listTitle) {
      const title = (displayTitle && String(displayTitle).trim()) || (listTitle && String(listTitle).trim()) || '';
      playerModalTitle.textContent = title ? `Torrents — ${title}` : 'Torrents';
      clearKinobdDom();
      kinobdMount.replaceChildren();
      easterKinobdMount.replaceChildren();

      if (!title) {
        kinobdMount.innerHTML = '<p style="padding:1rem;color:#555;">No title to look up torrents.</p>';
        playerModal.classList.add('is-open');
        return;
      }

      const div = document.createElement('div');
      div.id = 'kinobd';
      div.setAttribute('data-player', 'torrent');
      div.setAttribute('data-title', title);
      kinobdMount.appendChild(div);
      await finalizeKinobdMount();
    }

    function closePlayerModal() {
      playerModal.classList.remove('is-open');
      clearKinobdDom();
      kinobdMount.replaceChildren();
    }

    document.getElementById('playerModalClose').addEventListener('click', closePlayerModal);
    playerModal.addEventListener('click', (e) => {
      if (e.target === playerModal) closePlayerModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && playerModal.classList.contains('is-open')) closePlayerModal();
    });

    const easterEggPanel = document.getElementById('easterEggPanel');
    const easterKinobdMount = document.getElementById('easterKinobdMount');
    const easterKpInput = document.getElementById('easterKpInput');
    const easterKpCheck = document.getElementById('easterKpCheck');

    let globeClickCount = 0;
    let globeClickTimer = null;
    const GLOBE_CLICK_RESET_MS = 2500;

    document.getElementById('langGlobeLabel').addEventListener('click', () => {
      clearTimeout(globeClickTimer);
      globeClickCount += 1;
      if (globeClickCount >= 5) {
        globeClickCount = 0;
        easterEggPanel.classList.add('is-visible');
        easterEggPanel.setAttribute('aria-hidden', 'false');
        easterKpInput.focus();
        return;
      }
      globeClickTimer = setTimeout(() => {
        globeClickCount = 0;
      }, GLOBE_CLICK_RESET_MS);
    });

    easterKpCheck.addEventListener('click', async () => {
      const raw = easterKpInput.value.trim();
      const kp = Number(raw);
      closePlayerModal();
      clearKinobdDom();
      easterKinobdMount.replaceChildren();

      if (!Number.isInteger(kp) || kp <= 0) {
        const p = document.createElement('p');
        p.className = 'easter-error';
        p.textContent = 'Enter a valid positive Kinopoisk ID.';
        easterKinobdMount.appendChild(p);
        return;
      }

      const div = document.createElement('div');
      div.id = 'kinobd';
      div.setAttribute('data-kinopoisk', String(kp));
      easterKinobdMount.appendChild(div);
      await initKinobdWidget(easterKinobdMount);
    });

    easterKpInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') easterKpCheck.click();
    });

    async function renderPage() {
      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = fullList.slice(start, start + PAGE_SIZE);

      const container = document.getElementById('list');
      container.innerHTML = '';

      const results = await Promise.all(pageItems.map(item => fetchOneItem(item)));

      pageItems.forEach((item, i) => {
        const first = results[i];
        if (!first) return;

        const poster = first.poster_path
          ? `https://image.tmdb.org/t/p/w300${first.poster_path}`
          : 'https://via.placeholder.com/300x450?text=No+poster';
        const tmdbNumericId = first.id;
        const tmdbLink = `https://www.themoviedb.org/${currentType}/${tmdbNumericId}`;
        const displayName = first.name || first.title || item.title;
        const kinopoiskIdForPlayer = item.kinopoisk_id;

        const card = document.createElement('div');
        card.className = 'card';
        const torrentIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 16l4-4h-3V4h-2v8H8l4 4zm9-13h-6v2h6v14H3V5h6V3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>`;
        card.innerHTML = `
          <img src="${poster}" alt="${item.title}" loading="lazy" />
          <div class="card-title"><strong>${displayName}</strong></div>
          <div class="card-footer">
            <button type="button" class="torrent-btn" title="Torrents" aria-label="Open torrents (KinoBD)">${torrentIcon}</button>
            <button type="button" class="info-btn" title="Open on TMDb" aria-label="Open on The Movie Database">i</button>
            <div class="rating">⭐ ${item.rating}</div>
          </div>
        `;

        card.addEventListener('click', (e) => {
          if (e.target.closest('.info-btn') || e.target.closest('.torrent-btn')) return;
          openPlayerModal(displayName, kinopoiskIdForPlayer);
        });

        card.querySelector('.torrent-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          openTorrentModal(displayName, item.title);
        });

        card.querySelector('.info-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          window.open(tmdbLink, '_blank', 'noopener,noreferrer');
        });

        container.appendChild(card);
      });

      const totalPages = Math.ceil(fullList.length / PAGE_SIZE);
      document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages}`;
      document.getElementById('prevBtn').disabled = currentPage <= 1;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages;
    }

    document.getElementById('lang').addEventListener('change', (e) => {
      const newLang = e.target.value;
      localStorage.clear();
      localStorage.setItem('selectedLanguage', newLang);
      currentLanguage = newLang;
      currentPage = 1;
      loadRatings();
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('lang').value = currentLanguage;
      loadRatings();
    });
  </script>
</body>
</html>
