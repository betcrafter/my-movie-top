<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="favicon.ico">
  <title>Alex Approves</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>For anyone looking for something to watch... I hope you find it as interesting as I do.</h1>

  <div class="toggle-group">
    <div class="toggle-btn active" id="tvBtn">TV-SHOWS</div>
    <div class="toggle-btn" id="movieBtn">MOVIES</div>
  </div>

  <div class="search-bar">
    <label for="titleSearch">Search</label>
    <input type="search" id="titleSearch" placeholder="Title in your lists…" autocomplete="off" enterkeyhint="search" />
  </div>
  <div class="search-meta" id="searchMeta" aria-live="polite"></div>

  <div class="pagination" id="pagination" style="display: none;">
    <div class="pagination-row pagination-nav">
      <button type="button" id="prevBtn">← Prev</button>
      <div class="pagination-pages" id="pageNumbers" role="navigation" aria-label="Pages"></div>
      <button type="button" id="nextBtn">Next →</button>
    </div>
    <div class="pagination-row pagination-meta">
      <span class="page-info" id="pageInfo">Page 1 of 1</span>
      <div class="pagination-jump">
        <label for="pageJumpInput">Go to page</label>
        <input type="number" id="pageJumpInput" min="1" step="1" value="1" inputmode="numeric" />
        <button type="button" id="pageJumpBtn">Go</button>
      </div>
    </div>
  </div>

  <div class="grid" id="list"></div>

  <div class="player-modal" id="playerModal" role="dialog" aria-modal="true" aria-labelledby="playerModalTitle">
    <div class="player-modal-dialog">
      <button type="button" class="player-modal-close" id="playerModalClose" aria-label="Close">×</button>
      <h2 class="player-modal-title" id="playerModalTitle">Player</h2>
      <div id="kinobdMount"></div>
    </div>
  </div>

  <div class="lang-select">
    <label for="lang" id="langGlobeLabel">🌐</label>
    <select id="lang">
      <option value="en-US">English</option>
      <option value="ru-RU">Русский</option>
      <option value="pt-PT">Português</option>
      <option value="uk-UA">Українська</option>
    </select>
  </div>

  <section id="easterEggPanel" class="easter-egg-panel" aria-hidden="true">
    <p class="easter-egg-hint">Manual KinoBD player (Kinopoisk ID)</p>
    <div class="easter-egg-row">
      <label for="easterKpInput">Kinopoisk ID</label>
      <input type="text" id="easterKpInput" inputmode="numeric" autocomplete="off" placeholder="e.g. 104122" />
      <button type="button" id="easterKpCheck">Check</button>
    </div>
    <div id="easterKinobdMount"></div>
  </section>

  <script src="app.js" defer></script>
</body>
</html>
